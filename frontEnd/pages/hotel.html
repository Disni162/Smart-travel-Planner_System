<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Selection | Smart Travel Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2a9d8f;
            --dark: #264653;
            --accent: #e76f51;
            --white: #ffffff;
            --bg-light: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-light); color: var(--dark); line-height: 1.6; padding-bottom: 50px; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2000; background: rgba(8,28,21,0.4);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .btn-back { color:white; text-decoration:none; background:rgba(255,255,255,0.15);
            width:38px; height:38px; display:flex; align-items:center; justify-content:center;
            border-radius:50%; transition:0.3s; border:1px solid rgba(255,255,255,0.2);
        }
        .btn-back:hover { background: var(--white); color: var(--primary); transform: translateX(-5px); }
        .logo { font-size:22px; font-weight:800; color:white; text-decoration:none; letter-spacing:-1px; }
        .logo span { color: #FFD700; }
        .nav-links { display:flex; list-style:none; gap:25px; align-items:center; }
        .nav-links a { text-decoration:none; color:white; font-size:13px; font-weight:600; text-transform:uppercase; transition:0.3s; }
        .nav-links a:hover:not(.btn-logout) { color:#FFD700; }
        .btn-logout { background: rgba(255,255,255,0.1); padding:8px 20px; border-radius:12px; border:1px solid rgba(255,255,255,0.2); display:flex; align-items:center; gap:8px; color:white !important; }

        .header-section {
            text-align:center; padding:60px 20px;
            background: linear-gradient(rgba(38,70,83,0.8), rgba(38,70,83,0.8)), url('https://images.unsplash.com/photo-1546708973-b339540b5162?q=80&w=1500') center/cover;
            color:white; margin-bottom:40px;
        }
        .header-section h1 { font-size:2.5rem; margin-bottom:10px; }

        .container { max-width:1200px; margin:0 auto; padding:0 20px; }

        .dest-section { margin-bottom:80px; }
        .dest-header { display:flex; align-items:center; gap:15px; margin-bottom:30px; padding-bottom:10px; border-bottom:3px solid var(--primary); width:fit-content; }
        .dest-header i { color: var(--accent); font-size:1.8rem; }
        .dest-header h2 { font-size:1.8rem; text-transform:uppercase; letter-spacing:1px; }

        .hotel-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(320px,1fr)); gap:25px; }

        .hotel-card { background:var(--white); border-radius:20px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,0.05); transition:0.3s ease; display:flex; flex-direction:column; border:1px solid #eee; }
        .hotel-card:hover { transform:translateY(-10px); box-shadow:0 15px 35px rgba(0,0,0,0.1); }

        .img-container { position:relative; height:220px; }
        .hotel-img { width:100%; height:100%; object-fit:cover; }
        .type-badge { position:absolute; top:15px; left:15px; padding:6px 14px; border-radius:8px; font-size:0.75rem; font-weight:800; text-transform:uppercase; }
        .luxury { background:#fee2e2; color:#991b1b; }
        .standard { background:#fef3c7; color:#92400e; }
        .budget { background:#d1fae5; color:#065f46; }

        .card-body { padding:25px; flex-grow:1; display:flex; flex-direction:column; }
        .hotel-name { font-size:1.3rem; margin-bottom:8px; color: var(--dark); }
        .price { font-weight:700; color:var(--primary); font-size:1.2rem; display:block; margin-bottom:15px; }
        .features { list-style:none; font-size:0.9rem; color:#666; margin-bottom:15px; }
        .btn-select { display:block; width:100%; padding:12px; background:var(--dark); color:white; text-align:center; text-decoration:none; border-radius:12px; font-weight:600; transition:0.3s; }
        .btn-select:hover { background:var(--primary); }

        footer { text-align:center; padding:40px; background:var(--dark); color:white; margin-top:60px; }



        @media (max-width: 992px) {
            nav {
                padding: 10px 5%;
            }


            .menu-toggle {
                display: block;
                color: white;
                font-size: 24px;
                cursor: pointer;
            }


            .nav-links {
                position: fixed;
                top: 70px;
                right: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background: rgba(15, 23, 42, 0.95);
                flex-direction: column;
                padding: 40px;
                transition: 0.4s ease-in-out;
                text-align: center;
                gap: 30px;
                backdrop-filter: blur(10px);
            }


            .nav-links.active {
                right: 0;
            }

            .nav-links li {
                width: 100%;
            }

            .btn-logout {
                justify-content: center;
                width: fit-content;
                margin: 0 auto;
            }
        }


        @media (max-width: 768px) {
            .hero {
                height: 50vh;
            }

            .hero h1 {
                font-size: 32px;
            }

            .search-wrapper {
                width: 95%;
            }

            .section {
                padding: 40px 5%;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Card එකක අවම පළල 250px කිරීම */
                gap: 20px;
            }
        }


        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 18px;
            }

            .card-img {
                height: 180px;
            }
        }

        .menu-toggle {
            display: none;
            cursor: pointer;
            color: white;
            font-size: 24px;
        }

        @media (max-width: 992px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: flex;
                position: fixed;
                right: -100%;
                top: 70px;
                width: 100%;
                height: 100vh;
                background: rgba(38, 70, 83, 0.98);
                flex-direction: column;
                gap: 20px;
                padding-top: 50px;
                transition: 0.3s;
            }

            .nav-links.active {
                right: 0;
            }
        }

        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 1.8rem;
            }

            .dest-header h2 {
                font-size: 1.4rem;
            }


            .card-body p {
                font-size: 0.85rem;
                display: -webkit-box;
                -webkit-line-clamp: 3;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
        }

        @media (max-width: 480px) {
            .hotel-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

<nav id="mainNav">
    <div class="nav-left">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <a href="#" class="logo">Smart<span>Traveler</span></a>
    </div>

    <ul class="nav-links">
        <li><a href="about.html">About</a></li>
        <li><a href="hotel.html">Hotels</a></li>
        <li><a href="destinations.html">Destinations</a></li>
        <li><a href="activity.html">Activity</a></li>
        <li><a href="tripPlanner.html">Trip Builder</a></li>
<!--        <li><a href="#">Booking</a></li>-->
        <li><a href="index.html" class="btn-logout">Logout <i class="fas fa-sign-out-alt"></i></a></li>
    </ul>
</nav>

<div class="header-section">
    <h1>Hotel Selection</h1>
    <p>Choose your preferred stay</p>
</div>

<div class="container" id="hotelContainer">

</div>

<script>
    fetch("http://localhost:8080/api/v1/hotels")
        .then(response => response.json())
        .then(hotels => {
            const container = document.getElementById("hotelContainer");
            container.innerHTML = "";


            const destinations = {};
            hotels.forEach(h => {
                if (!destinations[h.destination]) destinations[h.destination] = [];
                destinations[h.destination].push(h);
            });


            Object.keys(destinations).forEach(destName => {
                const hotelsHTML = destinations[destName].map(hotel => `
    <div class="hotel-card">
        <div class="img-container">
            <img src="${hotel.image}" class="hotel-img" alt="${hotel.name}">
            <span class="type-badge ${hotel.type.toLowerCase()}">${hotel.type}</span>
        </div>
        <div class="card-body">
            <h3 class="hotel-name">${hotel.name}</h3>
            <span class="price">LKR ${hotel.pricePerNight.toLocaleString()} / night</span>
            <p>${hotel.description}</p>

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto;">
                <button onclick="directBook('${hotel.name}', ${hotel.pricePerNight}, '${hotel.type}')"
                        style="width: 100%; padding: 12px; background: #264653; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s;">
                    Book Now
                </button>
                <a href="tripPlanner.html?add=${hotel.id}"
                   style="width: 100%; padding: 12px; background: transparent; border: 2px solid #264653; color: #264653; text-align: center; text-decoration: none; border-radius: 12px; font-weight: 600; transition: 0.3s;">
                    Add to Plan
                </a>
            </div>
        </div>
    </div>
`).join("");
                const destHTML = `
            <div class="dest-section">
                <div class="dest-header">
                    <i class="fas fa-map-marker-alt"></i>
                    <h2>${destName}</h2>
                </div>
                <div class="hotel-row">
                    ${hotelsHTML}
                </div>
            </div>
        `;

                container.insertAdjacentHTML("beforeend", destHTML);
            });
        })
        .catch(err => console.error("Error loading hotels:", err));
    function directBook(name, price, type) {
        const tempTrip = {
            destName: name,
            days: 1,
            stayType: type,
            cost: price
        };
        localStorage.setItem('tempTrip', JSON.stringify(tempTrip));
        window.location.href = "Booking.html";
    }


</script>

<footer>
    <p>&copy; 2026 Smart Travel Planner</p>
</footer>

</body>
</html>
