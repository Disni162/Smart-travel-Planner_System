<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Blogger Signup</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1a3c6d 35%,#ffffff 35.1%);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:900px;
            height:600px;
            display:flex;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            border-radius:20px;
            overflow:hidden;
            background:white;
        }

        .left-side{
            flex:1.2;
            background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
            url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b');
            background-size:cover;
            background-position:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            padding:50px;
            text-align:center;
            position:relative;
        }

        .left-side h2{
            font-size:28px;
            font-weight:600;
            letter-spacing:2px;
            line-height:1.3;
        }

        .right-side{
            flex:1;
            background:#24467d;
            padding:50px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            color:white;
        }

        .logo-box{
            border:2px solid rgba(255,255,255,0.8);
            padding:12px 25px;
            align-self:center;
            margin-bottom:40px;
            font-weight:600;
            letter-spacing:3px;
            font-size:18px;
        }

        .input-group{
            margin-bottom:20px;
            position:relative;
        }

        .input-group input, select{
            width:100%;
            background:none;
            border:none;
            border-bottom:1px solid rgba(255,255,255,0.4);
            padding:12px 0;
            color:white;
            outline:none;
            font-size:15px;
        }

        .input-group input::placeholder{
            color:white;
        }

        .enter-btn{
            background:white;
            color:#24467d;
            border:none;
            padding:14px;
            border-radius:30px;
            font-weight:600;
            font-size:16px;
            cursor:pointer;
            transition:0.4s;
            width:100%;
        }

        .enter-btn:hover{
            background:#f0f0f0;
        }

        .message{
            text-align:center;
            margin-top:15px;
            font-size:14px;
            font-weight:600;
        }

        .signin-link{
            text-align:center;
            margin-top:20px;
            font-size:13px;
        }

        .signin-link a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="left-side">
        <h2>Travel is the only thing you buy that makes you richer</h2>
    </div>

    <div class="right-side">

        <div class="logo-box">
            ISLAND VIBES
        </div>

        <form id="signupForm" onsubmit="signupUser(event)">

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <div class="input-group">
                <select id="role">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <button type="submit" class="enter-btn">
                SIGN UP
            </button>

        </form>

        <div class="message" id="message"></div>

        <div class="signin-link">
            Already have an account? <a href="signin.html">Sign In</a>
        </div>

    </div>
</div>

<script>

    async function signupUser(event){

        event.preventDefault();

        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;
        let confirmPassword = document.getElementById("confirmPassword").value;
        let role = document.getElementById("role").value;

        try{

            const response = await fetch("http://localhost:8080/api/v1/travel/signup",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify({
                    email:email,
                    password:password,
                    confirmPassword:confirmPassword,
                    role:role
                })

            });

            const result = await response.json();

            if(response.ok){

                document.getElementById("message").style.color="lightgreen";
                document.getElementById("message").innerText="Registration Successful!";

                setTimeout(()=>{
                    window.location.href="signin.html";
                },1200);

            }else{

                document.getElementById("message").style.color="red";
                document.getElementById("message").innerText=result.message || "Registration Failed";

            }

        }catch(error){

            document.getElementById("message").style.color="red";
            document.getElementById("message").innerText="Server Error";

        }

    }

</script>

</body>
</html>
