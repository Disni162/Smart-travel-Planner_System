<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Blogger Sign In</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1a3c6d 35%,#ffffff 35.1%);
            padding:20px;
        }

        .container{
            width:100%;
            max-width:900px;
            height:550px;
            display:flex;
            box-shadow:0 25px 50px rgba(0,0,0,0.4);
            border-radius:20px;
            overflow:hidden;
            background:white;
        }

        .left-side{
            flex:1.2;
            background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
            url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');
            background-size:cover;
            background-position:center;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            padding:50px;
            text-align:center;
            position:relative;
        }

        .left-side h2{
            font-size:28px;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:2px;
            line-height:1.3;
            text-shadow:2px 2px 10px rgba(0,0,0,0.5);
        }

        .social-icons-left{
            position:absolute;
            bottom:40px;
            display:flex;
            gap:20px;
        }

        .social-icons-left i{
            font-size:18px;
            cursor:pointer;
            opacity:0.8;
            transition:0.3s;
        }

        .social-icons-left i:hover{
            opacity:1;
            transform:scale(1.2);
        }

        .right-side{
            flex:1;
            background:#24467d;
            padding:50px 40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            color:white;
        }

        .logo-box{
            border:2px solid rgba(255,255,255,0.8);
            padding:12px 25px;
            align-self:center;
            margin-bottom:40px;
            font-weight:600;
            letter-spacing:3px;
            font-size:18px;
        }

        .social-login{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-bottom:15px;
        }

        .social-login i{
            width:40px;
            height:40px;
            border:1px solid rgba(255,255,255,0.3);
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        .social-login i:hover{
            background:white;
            color:#24467d;
        }

        .or-text{
            text-align:center;
            font-size:12px;
            margin-bottom:35px;
            color:rgba(255,255,255,0.6);
        }

        .input-group{
            margin-bottom:25px;
            position:relative;
        }

        .input-group input{
            width:100%;
            background:none;
            border:none;
            border-bottom:1px solid rgba(255,255,255,0.4);
            padding:12px 0;
            color:white;
            outline:none;
            font-size:15px;
        }

        .input-group input:focus{
            border-bottom:1px solid white;
        }

        .input-group i{
            position:absolute;
            right:0;
            bottom:12px;
            font-size:14px;
            color:rgba(255,255,255,0.6);
            cursor:pointer;
        }

        .forgot-pass{
            text-align:right;
            font-size:12px;
            margin-bottom:30px;
            cursor:pointer;
            color:rgba(255,255,255,0.7);
        }

        .forgot-pass:hover{
            text-decoration:underline;
            color:white;
        }

        .enter-btn{
            background:white;
            color:#24467d;
            border:none;
            padding:14px;
            border-radius:30px;
            font-weight:600;
            font-size:16px;
            cursor:pointer;
            transition:0.4s;
            letter-spacing:1px;
        }

        .enter-btn:hover{
            background:#f0f0f0;
            transform:translateY(-2px);
        }

        .signup-link{
            text-align:center;
            margin-top:20px;
            font-size:13px;
        }

        .signup-link a{
            color:white;
            font-weight:600;
            text-decoration:none;
        }

        .signup-link a:hover{
            text-decoration:underline;
        }

        @media (max-width:768px){

            .container{
                flex-direction:column;
                height:auto;
            }

            .left-side{
                padding:60px 20px;
            }

            body{
                background:#24467d;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <div class="left-side">

        <h2>Explore the world with island vibes planning</h2>

        <div class="social-icons-left">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-twitter"></i>
            <i class="fab fa-instagram"></i>
        </div>

    </div>


    <div class="right-side">

        <div class="logo-box">
            SmartTraveler
        </div>

        <div class="social-login">
            <i class="fab fa-facebook-f"></i>
            <i class="fab fa-google-plus-g"></i>
            <i class="fab fa-linkedin-in"></i>
        </div>

        <p class="or-text">or sign in with email</p>

        <!-- LOGIN FORM -->
        <form onsubmit="loginUser(event)">

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
                <i class="fas fa-user"></i>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" id="password" required>
                <i class="fas fa-eye-slash" onclick="togglePassword()"></i>
            </div>

            <p class="forgot-pass">Forgot Password?</p>

            <button class="enter-btn"  style="width:100%">SIGN IN</button>

        </form>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>

    </div>

</div>

<script>

    function loginUser(event){

        event.preventDefault();

        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        fetch("http://localhost:8080/api/v1/travel/signin",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email:email,
                password:password
            })

        })
            .then(response => response.json())

            .then(data=>{

                console.log("Server Response:",data);

                if(data.code === 200){

                    alert("Login Successful");

                    localStorage.setItem("token",data.data.access_Token);

                    let role = data.data.role;

                    // ROLE BASED REDIRECT
                    if(role === "ADMIN"){

                        window.location.href = "adminDashboard.html";

                    }else{

                        window.location.href = "homepage.html";

                    }

                }else{

                    alert(data.message || "Login Failed");

                }

            })

            .catch(error=>{

                console.error("Error:",error);
                alert("Server connection error");

            });

    }


</script>

</body>
</html>
