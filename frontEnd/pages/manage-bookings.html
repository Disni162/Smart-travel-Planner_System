<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTraveler Admin | Manage Bookings</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #0077b6;
            --secondary-blue: #00b4d8;
            --light-blue: #caf0f8;
            --white: #ffffff;
            --dark-blue: #03045e;
            --glass: rgba(255, 255, 255, 0.1);
            --accent-cyan: #13e4db;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body {
            display: flex;
            background: linear-gradient(rgba(3, 4, 94, 0.7), rgba(3, 4, 94, 0.7)),
            url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            min-height: 100vh;
            color: var(--white);
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-brand { font-size: 22px; font-weight: 800; margin-bottom: 40px; color: var(--accent-cyan); }

        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px;
            color: var(--light-blue); text-decoration: none; margin-bottom: 8px; transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active { background: var(--accent-cyan); color: var(--dark-blue); font-weight: 600; }

        /* MAIN CONTENT */
        .main-content { margin-left: 280px; padding: 40px; width: 100%; }

        .dashboard-card {
            background: var(--glass); backdrop-filter: blur(20px); border-radius: 30px;
            padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 { margin-bottom: 30px; font-size: 2rem; color: var(--accent-cyan); }

        /* TABLE STYLING */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 15px; color: var(--accent-cyan); font-size: 0.85rem; text-transform: uppercase; }
        tbody tr { background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        tbody tr:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        td { padding: 15px; vertical-align: middle; }

        .status-badge {
            padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .status-pending { background: #ffa500; color: #fff; }
        .status-confirmed { background: var(--accent-cyan); color: var(--dark-blue); }

        .btn-action {
            width: 35px; height: 35px; border-radius: 10px; border: none; cursor: pointer; transition: 0.3s; margin-right: 5px;
        }
        .btn-confirm { background: var(--white); color: var(--dark-blue); }
        .btn-confirm:hover { background: var(--accent-cyan); }
        .btn-delete { background: rgba(255, 77, 77, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .btn-delete:hover { background: var(--danger); color: white; }

        .btn-confirm:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="admin-brand"><i class="fas fa-paper-plane"></i> SmartTraveler</div>
    <a href="adminDashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i> Overview</a>
    <a href="userManagement.html" class="nav-item "><i class="fa-solid fa-users"></i> User Management</a>
    <a href="DestinationManagement.html" class="nav-item"><i class="fas fa-map-marked-alt"></i> Destinations</a>
    <a href="HotelManagement.html" class="nav-item"><i class="fas fa-hotel"></i> Hotels</a>
    <a href="AdminActivity.html" class="nav-item"><i class="fas fa-walking"></i> Activities</a>
    <a href="manage-bookings.html" class="nav-item"><i class="fas fa-receipt"></i> Bookings</a>
    <a href="index.html" class="nav-item logout"><i class="fas fa-power-off"></i> Logout</a>
</div>

<div class="main-content">
    <div class="dashboard-card">
        <h2><i class="fas fa-tasks"></i> Booking Management</h2>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Customer</th>
                    <th>Destination</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="admin-booking-table">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>

    window.onload = loadAllBookings;

    async function loadAllBookings() {
        try {
            const response = await fetch('http://localhost:8080/api/v1/bookings/all');
            const bookings = await response.json();

            const tableBody = document.getElementById('admin-booking-table');
            tableBody.innerHTML = "";

            if (!bookings || bookings.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:50px;">No bookings found.</td></tr>`;
                return;
            }

            bookings.forEach(book => {
                const statusClass = book.status === 'CONFIRMED' ? 'status-confirmed' : 'status-pending';

                tableBody.innerHTML += `
                    <tr>
                        <td>
                            <div style="font-weight:600;">${book.customerName}</div>
                            <div style="font-size:0.7rem; opacity:0.6;">${book.customerEmail}</div>
                        </td>
                        <td>${book.destinationName}</td>
                        <td><i class="far fa-calendar-alt"></i> ${book.travelDate || 'N/A'}</td>
                        <td style="font-weight:700; color:var(--accent-cyan);">LKR ${(book.totalPrice || 0).toLocaleString()}</td>
                        <td><span class="status-badge ${statusClass}">${book.status}</span></td>
                        <td>
                            <button onclick="updateStatus(${book.id})" class="btn-action btn-confirm"
                                title="Confirm" ${book.status === 'CONFIRMED' ? 'disabled' : ''}>
                                <i class="fas fa-check"></i>
                            </button>
                            <button onclick="deleteBooking(${book.id})" class="btn-action btn-delete" title="Delete">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        }
    }


    async function updateStatus(id) {
        if (!confirm("Confirm this booking?")) return;

        try {
            const res = await fetch(`http://localhost:8080/api/v1/bookings/update-status/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: "CONFIRMED" })
            });

            if (res.ok) {
                loadAllBookings();
            }
        } catch (err) { alert("Error updating status"); }
    }


    async function deleteBooking(id) {
        if (!confirm("Are you sure you want to delete this booking?")) return;

        try {
            const res = await fetch(`http://localhost:8080/api/v1/bookings/cancel/${id}`, {
                method: 'DELETE'
            });

            if (res.ok) {
                loadAllBookings();
            }
        } catch (err) { alert("Error deleting booking"); }
    }
</script>

</body>
</html>
