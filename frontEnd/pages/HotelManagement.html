<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTraveler | Hotel Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --white: #ffffff;
            --sidebar-bg: #ffffff;
            --primary-dark: #0f172a;
            --text-light: #64748b;
            --accent-blue: #e0f2fe;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--primary); display: flex; min-height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: 0.3s;
        }

        .admin-brand {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links { list-style: none; flex-grow: 1; }

        .nav-item {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            border-radius: 16px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-blue);
            color: var(--primary-dark);
        }

        .nav-item.logout { color: var(--danger); margin-top: auto; }

        .main-content { margin-left: 280px; flex: 1; padding: 40px; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 40px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input, select, textarea {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save { background: var(--accent); color: white; margin-top: 20px; }
        .btn-update { background: var(--warning); color: white; margin-top: 20px; display: none; }
        .btn-cancel { background: #94a3b8; color: white; margin-top: 20px; display: none; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        th {
            background: #f1f5f9;
            padding: 15px;
            text-align: left;
            font-size: 14px;
            color: #64748b;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }

        .hotel-thumb {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
        }

        .actions { display: flex; gap: 15px; }

        .btn-edit, .btn-delete {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-edit { color: var(--warning); }
        .btn-delete { color: var(--danger); }

        .hamburger {
            display: none;
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .main-content { padding:20px; }
            .form-grid { grid-template-columns:1fr; }
        }

        @media (max-width: 768px) {

            .hamburger { display: block; }

            .sidebar {
                left:-100%;
            }

            .sidebar.active {
                left:0;
            }

            .main-content {
                margin-left:0;
                padding:20px;
            }

            table {
                display:block;
                overflow-x:auto;
                white-space:nowrap;
            }
        }

        @media (max-width: 480px) {

            .header h1 {
                font-size: 20px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

        }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="admin-brand">
        <i class="fas fa-paper-plane"></i>
        SmartTraveler
    </div>
    <div class="nav-links">
        <a href="adminDashboard.html" class="nav-item "><i class="fas fa-chart-pie"></i> Overview</a>
        <a href="userManagement.html" class="nav-item "><i class="fa-solid fa-users"></i> User Management</a>
        <a href="DestinationManagement.html" class="nav-item"><i class="fas fa-map-marked-alt"></i> Destinations</a>
        <a href="HotelManagement.html" class="nav-item active"><i class="fas fa-hotel"></i> Hotels</a>
        <a href="AdminActivity.html" class="nav-item"><i class="fas fa-walking"></i> Activities</a>
        <a href="Booking.html" class="nav-item"><i class="fas fa-receipt"></i> Bookings</a>
        <a href="index.html" class="nav-item logout"><i class="fas fa-power-off"></i> Logout</a>
    </div>
</div>

<main class="main-content">
    <div class="header">
        <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('active')">
            <i class="fas fa-bars"></i>
        </button>
        <h1>Hotel Management</h1>
        <p id="currentTime" style="color: #64748b; font-size: 14px;"></p>
    </div>

    <div class="card">
        <h3 id="formTitle"><i class="fas fa-plus-circle"></i> Add New Hotel</h3>
        <input type="hidden" id="hotelId">
        <div class="form-grid" style="margin-top: 20px;">
            <div class="form-group">
                <label>Hotel Name</label>
                <input type="text" id="hotelName">
            </div>
            <div class="form-group">
                <label>Destination</label>
                <input type="text" id="destination">
            </div>
            <div class="form-group">
                <label>Room Type</label>
                <select id="type">
                    <option value="Luxury">Luxury</option>
                    <option value="Standard">Standard</option>
                    <option value="Budget">Budget</option>
                </select>
            </div>
            <div class="form-group">
                <label>Price</label>
                <input type="number" id="price">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Image URL</label>
                <input type="text" id="imageUrl">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Description</label>
                <textarea id="desc"></textarea>
            </div>
        </div>

        <button id="saveBtn" class="btn btn-save" onclick="saveHotel()">
            <i class="fas fa-save"></i> Save Hotel
        </button>
        <button id="updateBtn" class="btn btn-update" onclick="updateHotel()">
            <i class="fas fa-sync-alt"></i> Update Hotel
        </button>
        <button id="cancelBtn" class="btn btn-cancel" onclick="resetForm()">
            Cancel
        </button>
    </div>

    <h3><i class="fas fa-list"></i> Registered Hotels</h3>
    <table style="margin-top: 20px;">
        <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Destination</th>
            <th>Type</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody id="hotelTableBody"></tbody>
    </table>
</main>

<script>
    const API_URL = "http://localhost:8080/api/v1/hotels";
    let allHotels = [];

    document.getElementById('currentTime').innerText = new Date().toDateString();

    async function loadHotels() {
        try {
            const response = await fetch(`${API_URL}/getAll`);
            allHotels = await response.json();
            const tableBody = document.getElementById('hotelTableBody');
            tableBody.innerHTML = "";

            allHotels.forEach(h => {
                tableBody.innerHTML += `
                        <tr>
                            <td><img src="${h.image}" class="hotel-thumb"></td>
                            <td><strong>${h.name}</strong></td>
                            <td>${h.destination}</td>
                            <td>${h.type}</td>
                            <td>Rs. ${h.pricePerNight}</td>
                            <td class="actions">
                                <button class="btn-edit" onclick="editHotel(${h.id})"><i class="fas fa-edit"></i></button>
                                <button class="btn-delete" onclick="deleteHotel(${h.id})"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>`;
            });
        } catch (err) { console.error(err); }
    }

    function getFormData() {
        return {
            name: document.getElementById('hotelName').value,
            destination: document.getElementById('destination').value,
            type: document.getElementById('type').value,
            pricePerNight: parseFloat(document.getElementById('price').value),
            image: document.getElementById('imageUrl').value,
            description: document.getElementById('desc').value
        };
    }

    window.onload = loadHotels;
</script>
</body>
</html>
