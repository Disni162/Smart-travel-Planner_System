<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Island Vibes | Luxury Sri Lanka</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #13e4db;
            --dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Full Background Image */
        .main-wrapper {
            width: 95%;
            height: 90vh;
            background: url("https://images.unsplash.com/photo-1546708973-b339540b5162?q=80&w=2000&auto=format&fit=crop") center/cover no-repeat;
            border-radius: 40px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
        }

        /* Dark Overlay for focus */
        .main-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at left, rgba(2, 6, 23, 0.8) 0%, rgba(2, 6, 23, 0.2) 100%);
            border-radius: 40px;
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 40px;
            width: 100%;
            padding: 0 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo { color: white; font-size: 20px; font-weight: 800; letter-spacing: 2px; }
        .logo span { color: var(--primary); }

        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .login-link { color: white; text-decoration: none; font-size: 14px; font-weight: 600; }

        /* Floating Content Card */
        .glass-container {
            position: relative;
            z-index: 5;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            padding: 60px;
            border-radius: 40px;
            border: 1px solid var(--border);
            width: 550px;
            margin-left: -400px; /* Aligns to left side nicely */
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .badge {
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            padding: 6px 15px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2);
        }

        h1 {
            font-size: 65px;
            color: white;
            line-height: 1;
            margin-bottom: 10px;
            font-weight: 800;
        }

        h1 span {
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
            max-width: 400px;
        }

        .btn-main {
            background: white;
            color: var(--dark);
            padding: 15px 35px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-main:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        /* Right Side Activity Widget */
        .info-widget {
            position: absolute;
            right: 60px;
            bottom: 60px;
            z-index: 5;
            display: flex;
            gap: 20px;
        }

        .mini-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
        }

    </style>
</head>
<body>

<div class="main-wrapper">

    <nav>
        <div class="logo">Smart<span>Traveler</span></div>
        <div class="nav-actions">

            <a href="signup.html" class="btn-main" style="padding: 10px 25px; border-radius: 12px;">Sign Up</a>
        </div>
    </nav>

    <div class="glass-container">
        <span class="badge">#1 TRAVEL PLANNER</span>
        <h1>Explore <br><span>Sri Lanka.</span></h1>
        <p>
            Experience the golden beaches and misty mountains.
            Our smart platform helps you discover hidden gems across the island.
        </p>
        <div class="actions">
            <a href="signin.html" class="btn-main">
                Start Planning <i class="fas fa-chevron-right"></i>
            </a>
        </div>
    </div>

    <div class="info-widget">
        <div class="mini-card">
            <div class="icon-box"><i class="fas fa-umbrella-beach"></i></div>
            <div>
                <h4 style="font-size: 14px;">Beaches</h4>
                <p style="margin: 0; font-size: 11px;">12+ Destinations</p>
            </div>
        </div>
        <div class="mini-card">
            <div class="icon-box" style="background: #13e4db;"><i class="fas fa-mountain"></i></div>
            <div>
                <h4 style="font-size: 14px;">Highlands</h4>
                <p style="margin: 0; font-size: 11px;">8+ Hidden Spots</p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
