<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Travel | Explore Destinations</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --sl-green: #2D5A27;
      --sl-gold: #13e4db;
      --dark-blue: #0f172a;
      --soft-white: #f8fafc;
      --logout-red: #e11d48;
      --glass: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background-color: var(--soft-white); overflow-x: hidden; color: #334155; scroll-behavior: smooth; }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      transition: 0.3s ease;
    }

    .nav-left { display: flex; align-items: center; gap: 20px; }
    .btn-back { color: white; background: rgba(255, 255, 255, 0.15); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid rgba(255, 255, 255, 0.2); text-decoration: none; }
    .logo { font-size: 24px; font-weight: 800; color: white; text-decoration: none; }
    .logo span { color: var(--sl-gold); }

    .nav-links { display: flex; list-style: none; gap: 25px; align-items: center; }
    .nav-links a { text-decoration: none; color: white; font-size: 13px; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
    .nav-links a:hover { color: var(--sl-gold); }

    .btn-logout { background: rgba(255, 255, 255, 0.1); padding: 8px 18px; border-radius: 12px; display: flex; align-items: center; gap: 8px; }
    .btn-logout:hover { background: var(--logout-red) !important; transform: translateY(-2px); }

    .hero {
      height: 70vh;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.3)), url('https://images.travelandleisureasia.com/wp-content/uploads/sites/4/2023/11/22150028/mirissa.jpeg') center/cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 0 20px;
    }

    .hero h1 { font-size: clamp(35px, 6vw, 60px); font-weight: 800; margin-bottom: 20px; }

    .search-wrapper {
      width: 100%;
      max-width: 600px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 10px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .search-wrapper i { margin-left: 20px; color: var(--sl-gold); font-size: 18px; }

    .search-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 20px;
      color: white;
      font-size: 16px;
    }

    .search-wrapper input::placeholder { color: rgba(255, 255, 255, 0.7); }

    .section { padding: 80px 8%; }
    .section-title { text-align: center; margin-bottom: 50px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 35px;
    }

    .card {
      background: white;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      transition: 0.4s ease;
      border: 1px solid #f1f5f9;
      display: flex;
      flex-direction: column;
    }

    .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .card-img { width: 100%; height: 220px; object-fit: cover; transition: 0.5s; }
    .card-body { padding: 25px; flex-grow: 1; }
    .card-body h3 { font-size: 22px; color: var(--dark-blue); margin-bottom: 10px; }
    .card-body p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 20px; }

    .btn-view {
      display: block;
      text-align: center;
      background: var(--dark-blue);
      color: white;
      padding: 12px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-view:hover { background: var(--sl-green); }

    #noResults {
      grid-column: 1 / -1;
      text-align: center;
      padding: 50px;
      display: none;
    }

    footer { background: var(--dark-blue); color: white; padding: 60px 8% 30px; text-align: center; }

    .menu-toggle {
      display: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
    }

    @media (max-width: 992px) {

      nav { padding: 10px 5%; }

      .menu-toggle { display: block; }

      .nav-links {
        position: fixed;
        top: 0;
        left: -100%;
        width: 280px;
        height: 100vh;
        background: #0f172a;
        flex-direction: column;
        padding: 80px 40px;
        transition: 0.4s ease-in-out;
        box-shadow: 5px 0 15px rgba(0, 0, 0, 0.2);
      }

      .nav-links.active { left: 0; }

      .nav-links li { margin: 15px 0; }
    }

    @media (max-width: 768px) {
      .hero { height: 50vh; }
      .hero h1 { font-size: 32px; }
      .search-wrapper { width: 95%; }
      .section { padding: 40px 5%; }

      .grid {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 20px;
      }
    }
  </style>
</head>
<body>

<nav id="mainNav">
  <div class="nav-left">
    <a href="homepage.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
    <a href="#" class="logo">Smart<span>Traveler</span></a>
  </div>
  <div class="menu-toggle" id="mobile-menu">
    <i class="fas fa-bars"></i>
  </div>
  <ul id="nav-list" class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="hotel.html">Hotels</a></li>
    <li><a href="destinations.html">Destinations</a></li>
    <li><a href="activity.html">Activity</a></li>
    <li><a href="tripPlanner.html">Trip Builder</a></li>
    <li><a href="index.html" class="btn-logout">Logout <i class="fas fa-sign-out-alt"></i></a></li>
  </ul>
</nav>

<section class="hero">
  <h1>Find Your Next Escape</h1>
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="destSearch" placeholder="Search destinations (e.g. Galle, Ella, Kandy)..." onkeyup="filterDestinations()">
  </div>
</section>

<main class="section">
  <div class="section-title">
    <h2>Explore Sri Lanka</h2>
    <p>Discover the beauty of the pearl of the Indian Ocean</p>
  </div>

  <div class="grid" id="destinationContainer"></div>

  <div id="noResults">
    <i class="fas fa-map-marked-alt fa-3x" style="color: #cbd5e1; margin-bottom: 15px;"></i>
    <h3>No destinations found matching your search.</h3>
  </div>
</main>

<footer>
  <p>&copy; 2026 SmartTraveler. Discover Sri Lanka.</p>
</footer>

<script>
  const menuBtn = document.getElementById('mobile-menu');
  const navList = document.getElementById('nav-list');

  menuBtn.addEventListener('click', () => {
    navList.classList.toggle('active');
    const icon = menuBtn.querySelector('i');
    icon.classList.toggle('fa-bars');
    icon.classList.toggle('fa-times');
  });

  let allDestinations = [];

  async function loadDestinations() {
    const res = await fetch("http://localhost:8080/api/v1/destinations");
    const data = await res.json();
    allDestinations = data.data;
    displayDestinations(allDestinations);
  }

  function displayDestinations(data) {
    const container = document.getElementById("destinationContainer");
    const noResults = document.getElementById("noResults");
    container.innerHTML = "";

    if (data.length === 0) {
      noResults.style.display = "block";
      return;
    } else {
      noResults.style.display = "none";
    }

    data.forEach(dest => {
      const card = `
      <div class="card">
        <img src="${dest.image}" class="card-img">
        <div class="card-body">
          <h3>${dest.name}</h3>
          <p>${dest.description.substring(0,80)}...</p>
          <a href="${getDetailsPage(dest)}" class="btn-view">View Details</a>
        </div>
      </div>`;
      container.insertAdjacentHTML("beforeend", card);
    });
  }

  function getDetailsPage(dest) {
    const name = dest.name.toLowerCase();

    if (name.includes("ella")) return `destinationDetailsElla.html?id=${dest.id}`;
    if (name.includes("galle")) return `destinationDetailsGalle.html?id=${dest.id}`;
    if (name.includes("mirissa")) return `destinationMirissa.html?id=${dest.id}`;
    if (name.includes("sigiriya")) return `destinationSigiriya.html?id=${dest.id}`;
    if (name.includes("polonnaruwa")) return `destinationPolonnruwa.html?id=${dest.id}`;
    if (name.includes("nuwara eliya")) return `destinationNuwaraeliya.html?id=${dest.id}`;
    if (name.includes("jaffna")) return `destinationJeffna.html?id=${dest.id}`;
    if (name.includes("anuradhapura")) return `destinationaAnuradhapura.html?id=${dest.id}`;

    return `destinationDetails.html?id=${dest.id}`;
  }

  function filterDestinations() {
    const search = document.getElementById("destSearch").value.toLowerCase();
    const filtered = allDestinations.filter(d =>
            d.name.toLowerCase().includes(search)
    );
    displayDestinations(filtered);
  }

  window.onload = loadDestinations;
</script>

</body>
</html>
